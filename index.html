<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>한국 증시 일일 리포트</title>
<script src="reports.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  background: #f0f2f5;
  color: #1e293b;
  min-height: 100vh;
  display: flex;
}

/* ── Sidebar ── */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: #1a2942;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#sidebar-title {
  padding: 20px 16px 12px;
  font-size: 13px;
  font-weight: 700;
  color: #94a3b8;
  letter-spacing: .5px;
  text-transform: uppercase;
  border-bottom: 1px solid #2d3f5a;
}
#date-list { flex: 1; padding: 8px 0; }
.date-item {
  padding: 10px 18px;
  font-size: 13.5px;
  color: #cbd5e1;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .15s;
  line-height: 1.4;
}
.date-item:hover { background: #243557; color: #fff; }
.date-item.active {
  background: #243557;
  color: #60a5fa;
  border-left-color: #3b82f6;
  font-weight: 600;
}
.date-item .di-date { font-size: 12px; color: #94a3b8; }
.date-item.active .di-date { color: #93c5fd; }

/* ── Main ── */
#main {
  flex: 1;
  padding: 28px 32px;
  max-width: 1100px;
  overflow-x: hidden;
}

/* ── Report header ── */
.report-header {
  background: #1a2942;
  color: #fff;
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 20px;
}
.rh-badge {
  display: inline-block;
  background: #3b82f6;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .5px;
  margin-bottom: 10px;
}
.rh-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.rh-meta { font-size: 12px; color: #94a3b8; }

/* ── Section ── */
.section {
  background: #fff;
  border-radius: 12px;
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.section-title {
  font-size: 15px;
  font-weight: 800;
  color: #1a2942;
  background: #f0f4ff;
  border-left: 4px solid #3b82f6;
  padding: 8px 14px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 18px;
}

/* ── Market overview grid ── */
.market-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.market-card {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 12px 14px;
}
.mc-label { font-size: 11px; color: #64748b; font-weight: 600; margin-bottom: 4px; letter-spacing: .3px; }
.mc-value { font-size: 14px; font-weight: 700; color: #1e293b; }
.mc-change { font-size: 12px; margin-top: 2px; }
.pos { color: #ef4444; }
.neg { color: #3b82f6; }
.flat { color: #64748b; }

/* ── Breadth bar ── */
.breadth-bar {
  display: flex;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.bb-rise { background: #ef4444; }
.bb-fall { background: #3b82f6; }
.bb-flat { background: #e2e8f0; }
.breadth-label { font-size: 11px; color: #94a3b8; margin-top: 4px; }

/* ── Investor flow ── */
.investor-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.inv-chip {
  background: #f1f5f9;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: #374151;
}
.inv-chip span { font-weight: 700; }
.inv-chip span.pos { color: #ef4444; }
.inv-chip span.neg { color: #3b82f6; }

/* ── Stock cards ── */
.stock-list { display: flex; flex-direction: column; gap: 16px; }
.stock-card {
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  overflow: hidden;
}
.sc-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  flex-wrap: wrap;
}
.sc-rank {
  font-size: 18px;
  min-width: 28px;
}
.sc-name {
  font-size: 15px;
  font-weight: 700;
  color: #1a2942;
  text-decoration: none;
}
.sc-name:hover { text-decoration: underline; color: #3b82f6; }
.sc-vol { font-size: 12px; color: #64748b; margin-left: auto; white-space: nowrap; }
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.badge-high { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
.badge-low  { background: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
.badge-cons { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

.sc-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

.sc-price {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.price-arrow { font-size: 16px; }
.price-str { font-size: 15px; font-weight: 700; }
.price-change { font-size: 13px; font-weight: 600; }

.sc-metrics {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 12px;
  color: #475569;
}
.metric-tag {
  background: #f1f5f9;
  border-radius: 6px;
  padding: 3px 8px;
}
.metric-tag b { color: #1e293b; }

.sc-summary {
  font-size: 13px;
  color: #374151;
  line-height: 1.7;
  padding: 10px 12px;
  background: #fafafa;
  border-left: 3px solid #e2e8f0;
  border-radius: 0 6px 6px 0;
}

.sc-sentiment {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12.5px;
  color: #475569;
  flex-wrap: wrap;
}
.sent-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 12px;
  white-space: nowrap;
}
.sent-pos { background: #fef2f2; color: #ef4444; }
.sent-neg { background: #eff6ff; color: #3b82f6; }
.sent-neu { background: #f1f5f9; color: #64748b; }

.sc-insight {
  font-size: 12.5px;
  color: #374151;
  line-height: 1.75;
  border-top: 1px solid #f1f5f9;
  padding-top: 10px;
}
.sc-insight .insight-label {
  font-size: 11px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: .4px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.sc-keypoint {
  font-size: 13px;
  font-weight: 600;
  color: #1a2942;
  background: #f0f4ff;
  border-left: 3px solid #3b82f6;
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  line-height: 1.6;
}

/* ── Sector table ── */
.sector-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.sector-col-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .4px;
  padding: 6px 0;
  border-bottom: 2px solid #e2e8f0;
  margin-bottom: 6px;
}
.sector-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 6px;
  border-radius: 6px;
  font-size: 13px;
}
.sector-row:hover { background: #f8fafc; }
.sector-name { color: #374151; }
.sector-rate { font-weight: 700; font-size: 12.5px; }

.sector-analysis-text {
  font-size: 13px;
  color: #374151;
  line-height: 1.8;
  border-top: 1px solid #e2e8f0;
  padding-top: 16px;
  white-space: pre-wrap;
}

/* ── Empty state ── */
#empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: #94a3b8;
  font-size: 15px;
}

/* ── Responsive ── */
@media (max-width: 700px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; min-width: 0; height: auto; position: static; }
  #date-list { display: flex; overflow-x: auto; padding: 0; }
  .date-item { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; padding: 10px 14px; }
  .date-item.active { border-bottom-color: #3b82f6; border-left-color: transparent; }
  #main { padding: 16px; }
  .sector-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-title">📅 날짜 선택</div>
  <div id="date-list"></div>
</nav>

<div id="main">
  <div id="report-root"></div>
  <div id="empty" style="display:none">데이터가 없습니다.</div>
</div>

<script>
const RANK_EMOJI = ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
const SENTIMENT  = {'긍정':'pos','부정':'neg','중립':'neu'};
const SENT_LABEL = {'긍정':'😊 긍정','부정':'😟 부정','중립':'😐 중립'};

function fmtDate(d) {
  // "20260724" → "2026.07.24 (목)"
  if (!d || d.length < 8) return d;
  const y = d.slice(0,4), m = d.slice(4,6), day = d.slice(6,8);
  const dow = ['일','월','화','수','목','금','토'][new Date(`${y}-${m}-${day}`).getDay()];
  return `${y}.${m}.${day} (${dow})`;
}

function sign(v) { return v >= 0 ? '+' : ''; }
function cls(v)  { return v > 0 ? 'pos' : v < 0 ? 'neg' : 'flat'; }

function netStr(v) {
  const s = v >= 0 ? '+' : '';
  return `${s}${Math.round(v).toLocaleString()}억`;
}

function priceStr(prev, close, rate) {
  const arrow = rate >= 0 ? '📈' : '📉';
  const ch = `<span class="price-change ${cls(rate)}">${sign(rate)}${rate.toFixed(2)}%</span>`;
  if (prev && close) {
    return `<span class="price-arrow">${arrow}</span>
            <span class="price-str">${prev.toLocaleString()}원 → ${close.toLocaleString()}원</span> ${ch}`;
  }
  return `<span class="price-arrow">${arrow}</span>
          <span class="price-str">${(close||0).toLocaleString()}원</span> ${ch}`;
}

function idxStr(prev, close, cr) {
  if (!close) return '-';
  const ch = `<span class="${cls(cr)}">${sign(cr)}${cr.toFixed(2)}%</span>`;
  if (prev) return `${prev.toLocaleString(undefined,{minimumFractionDigits:2})} → ${close.toLocaleString(undefined,{minimumFractionDigits:2})} ${ch}`;
  return `${close.toLocaleString(undefined,{minimumFractionDigits:2})} ${ch}`;
}

function renderMarketCard(label, valueHtml, changeHtml, breadth) {
  return `<div class="market-card">
    <div class="mc-label">${label}</div>
    <div class="mc-value">${valueHtml}</div>
    ${changeHtml ? `<div class="mc-change">${changeHtml}</div>` : ''}
    ${breadth || ''}
  </div>`;
}

function breadthBar(rise, fall, flat, total) {
  if (!total) return '';
  const rp = (rise/total*100).toFixed(1);
  const fp = (fall/total*100).toFixed(1);
  const ep = (flat/total*100).toFixed(1);
  return `<div class="breadth-bar">
    <div class="bb-rise" style="width:${rp}%"></div>
    <div class="bb-fall" style="width:${fp}%"></div>
    <div class="bb-flat" style="flex:1"></div>
  </div>
  <div class="breadth-label">상승 ${rise} / 하락 ${fall} / 보합 ${flat} | 상승비 ${rp}%</div>`;
}

function renderOverview(ov) {
  const kpCr = ov.kospi_change_rate || 0;
  const kqCr = ov.kosdaq_change_rate || 0;
  const cards = [
    renderMarketCard('KOSPI',
      `<span class="${cls(kpCr)}">${(ov.kospi_close||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span>`,
      idxStr(ov.kospi_prev_close, ov.kospi_close, kpCr),
      breadthBar(ov.kospi_rise||0, ov.kospi_fall||0, ov.kospi_flat||0, ov.kospi_total||0)
    ),
    renderMarketCard('KOSDAQ',
      `<span class="${cls(kqCr)}">${(ov.kosdaq_close||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span>`,
      idxStr(ov.kosdaq_prev_close, ov.kosdaq_close, kqCr),
      breadthBar(ov.kosdaq_rise||0, ov.kosdaq_fall||0, ov.kosdaq_flat||0, ov.kosdaq_total||0)
    ),
    renderMarketCard('나스닥', `<span class="${cls(ov.nasdaq_cr||0)}">${(ov.nasdaq_close||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span>`,
      idxStr(ov.nasdaq_prev, ov.nasdaq_close, ov.nasdaq_cr||0)),
    renderMarketCard('S&P 500', `<span class="${cls(ov.sp500_cr||0)}">${(ov.sp500_close||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span>`,
      idxStr(ov.sp500_prev, ov.sp500_close, ov.sp500_cr||0)),
    renderMarketCard('다우존스', `<span class="${cls(ov.dow_cr||0)}">${(ov.dow_close||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span>`,
      idxStr(ov.dow_prev, ov.dow_close, ov.dow_cr||0)),
    renderMarketCard('VIX', `<span class="${cls(-(ov.vix_cr||0))}">${(ov.vix||0).toFixed(2)}</span>`,
      ov.vix_prev ? `${ov.vix_prev.toFixed(2)} → ${(ov.vix||0).toFixed(2)} <span class="${cls(ov.vix_cr||0)}">${sign(ov.vix_cr||0)}${(ov.vix_cr||0).toFixed(2)}%</span>` : ''),
    renderMarketCard('미국 10년물',
      `${(ov.us10y||0).toFixed(2)}%`,
      ov.us10y_prev ? (() => { const ch = ((ov.us10y||0)-(ov.us10y_prev||0)); return `${ov.us10y_prev.toFixed(2)}% → ${(ov.us10y||0).toFixed(2)}% <span class="${cls(ch)}">${sign(ch)}${ch.toFixed(3)}%p</span>`; })() : ''),
    renderMarketCard('원/달러',
      `<span class="${cls(ov.usdkrw_change||0)}">${(ov.usdkrw||0).toLocaleString(undefined,{minimumFractionDigits:2})}원</span>`,
      ov.usdkrw_prev ? `${ov.usdkrw_prev.toFixed(2)} → ${(ov.usdkrw||0).toFixed(2)}원 <span class="${cls(ov.usdkrw_change||0)}">${sign(ov.usdkrw_change||0)}${(ov.usdkrw_change||0).toFixed(2)}원</span>` : ''),
    renderMarketCard('WTI 유가',
      `<span class="${cls(ov.wti_change_rate||0)}">${(ov.wti_close||0).toFixed(2)}</span>`,
      idxStr(ov.wti_prev, ov.wti_close, ov.wti_change_rate||0)),
    (() => {
      const dep = ov.deposit || 0;
      const chg = ov.deposit_chg || 0;
      const depStr = dep ? `${(dep/10000).toFixed(1)}조원` : '—';
      const chgSign = chg > 0 ? '+' : chg < 0 ? '-' : '';
      const chgStr = chg ? `<span class="${cls(chg)}">${chgSign}${Math.abs(chg).toLocaleString()}억</span>` : '';
      return renderMarketCard('고객예탁금', depStr, chgStr);
    })(),
  ];

  const fNet = ov.foreign_net || 0, iNet = ov.inst_net || 0, pNet = ov.indiv_net || 0;
  const invRow = `<div class="investor-row">
    <div class="inv-chip">외국인 <span class="${cls(fNet)}">${netStr(fNet)}</span></div>
    <div class="inv-chip">기관 <span class="${cls(iNet)}">${netStr(iNet)}</span></div>
    <div class="inv-chip">개인 <span class="${cls(pNet)}">${netStr(pNet)}</span></div>
  </div>`;

  return `<div class="section">
    <div class="section-title">📈 시장 개요</div>
    <div class="market-grid">${cards.join('')}</div>
    ${invRow}
  </div>`;
}

function renderStock(s, idx, consecutiveMap) {
  const amount = (s.amount / 1e8).toLocaleString(undefined, {maximumFractionDigits:0});
  const prev   = s.prev_close || 0;
  const close  = s.close      || 0;
  const rate   = (prev && close) ? ((close-prev)/prev*100) : (s.change_rate || 0);
  const ticker = s.ticker || '';

  const badges = [];
  if (s.is_52w_high)  badges.push(`<span class="badge badge-high">52주 신고가 🔥</span>`);
  if (s.is_52w_low)   badges.push(`<span class="badge badge-low">52주 신저가 ⚠️</span>`);
  const cons = consecutiveMap[ticker] || 1;
  if (cons >= 2) badges.push(`<span class="badge badge-cons">${cons}일 연속</span>`);

  const nameHtml = ticker
    ? `<a class="sc-name" href="https://www.valley.town/financials/quote/${ticker}:KRX/summary" target="_blank">${s.name}</a>`
    : `<span class="sc-name">${s.name}</span>`;

  const cap = s.market_cap ? `${s.market_cap.toLocaleString()}억` : '-';
  const per = s.per ? `${s.per}` : '-';
  const eps = s.eps ? `${s.eps.toLocaleString()}원` : '-';
  const fNet = s.foreign_net || 0, iNet = s.inst_net || 0, pNet = s.indiv_net || 0;

  const sentiment  = s.sentiment || '중립';
  const sentCls    = SENTIMENT[sentiment] || 'neu';
  const sentLabel  = SENT_LABEL[sentiment] || '😐 중립';

  const insightHtml = s.insight
    ? `<div class="sc-insight"><div class="insight-label">📊 3축 분석</div>${escHtml(s.insight)}</div>` : '';
  const keyHtml = s.key_point
    ? `<div class="sc-keypoint">💡 ${escHtml(s.key_point)}</div>` : '';

  return `<div class="stock-card">
    <div class="sc-header">
      <span class="sc-rank">${RANK_EMOJI[idx] || (idx+1)+'.'}</span>
      ${nameHtml}
      ${badges.join(' ')}
      <span class="sc-vol">거래대금 ${amount}억</span>
    </div>
    <div class="sc-body">
      <div class="sc-price">${priceStr(prev, close, rate)}</div>
      <div class="sc-metrics">
        <span class="metric-tag">시총 <b>${cap}</b></span>
        <span class="metric-tag">PER <b>${per}</b></span>
        <span class="metric-tag">EPS <b>${eps}</b></span>
        <span class="metric-tag">외국인 <b class="${cls(fNet)}">${netStr(fNet)}</b></span>
        <span class="metric-tag">기관 <b class="${cls(iNet)}">${netStr(iNet)}</b></span>
        <span class="metric-tag">개인 <b class="${cls(pNet)}">${netStr(pNet)}</b></span>
      </div>
      ${s.summary ? `<div class="sc-summary">📝 ${escHtml(s.summary)}</div>` : ''}
      <div class="sc-sentiment">
        <span class="sent-badge sent-${sentCls}">${sentLabel}</span>
        <span>${escHtml(s.cause || '')}</span>
      </div>
      ${insightHtml}
      ${keyHtml}
    </div>
  </div>`;
}

function renderSector(sectorPerf, sectorAnalysis) {
  const bullish = sectorPerf.filter(s => s.rate > 0).sort((a,b) => b.rate - a.rate).slice(0,10);
  const bearish  = sectorPerf.filter(s => s.rate < 0).sort((a,b) => a.rate - b.rate).slice(0,10);

  const rateHtml = (r) => `<span class="sector-rate ${cls(r)}">${sign(r)}${r.toFixed(2)}%</span>`;

  const bRows = bullish.map(s => `<div class="sector-row"><span class="sector-name">${s.name}</span>${rateHtml(s.rate)}</div>`).join('');
  const aRows = bearish.map(s => `<div class="sector-row"><span class="sector-name">${s.name}</span>${rateHtml(s.rate)}</div>`).join('');

  const table = sectorPerf.length ? `<div class="sector-grid">
    <div>
      <div class="sector-col-title" style="color:#ef4444">🟢 강세 업종</div>
      ${bRows || '<div style="color:#94a3b8;font-size:13px">없음</div>'}
    </div>
    <div>
      <div class="sector-col-title" style="color:#3b82f6">🔴 약세 업종</div>
      ${aRows || '<div style="color:#94a3b8;font-size:13px">없음</div>'}
    </div>
  </div>` : '';

  const analysisHtml = sectorAnalysis
    ? `<div class="sector-analysis-text">${escHtml(sectorAnalysis)}</div>` : '';

  if (!table && !analysisHtml) return '';

  return `<div class="section">
    <div class="section-title">🔄 섹터 순환매 분석</div>
    ${table}
    ${analysisHtml}
  </div>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function renderReport(data) {
  const ov   = data.market_overview || {};
  const kpCr = ov.kospi_change_rate || 0;
  const mEmoji = kpCr >= 0 ? '🐂' : '🐻';
  const formatted = fmtDate(data.date);
  const tokStr = data.total_tokens >= 1000 ? `${Math.floor(data.total_tokens/1000)}k` : String(data.total_tokens||0);
  const consMap = data.consecutive_map || {};

  const kpSign = kpCr >= 0 ? '+' : '';
  const badgeTxt = kpCr >= 0 ? '강세 마감' : '약세 마감';

  let html = `
    <div class="report-header">
      <div class="rh-badge">${mEmoji} ${badgeTxt}</div>
      <div class="rh-title">${formatted} 한국 증시 리포트</div>
      <div class="rh-meta">KOSPI ${(ov.kospi_close||0).toLocaleString(undefined,{minimumFractionDigits:2})} (${kpSign}${kpCr.toFixed(2)}%) &nbsp;|&nbsp; 토큰 ${tokStr}</div>
    </div>
    ${renderOverview(ov)}`;

  if (data.stocks && data.stocks.length) {
    const cards = data.stocks.map((s,i) => renderStock(s, i, consMap)).join('');
    html += `<div class="section">
      <div class="section-title">📊 코스피 거래대금 TOP 10</div>
      <div class="stock-list">${cards}</div>
    </div>`;
  }

  if (data.kosdaq_stocks && data.kosdaq_stocks.length) {
    const cards = data.kosdaq_stocks.map((s,i) => renderStock(s, i, consMap)).join('');
    html += `<div class="section">
      <div class="section-title">📊 코스닥 거래대금 TOP 10</div>
      <div class="stock-list">${cards}</div>
    </div>`;
  }

  html += renderSector(data.sector_perf || [], data.sector_analysis || '');
  return html;
}

function buildSidebar(dates) {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  dates.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'date-item' + (i === 0 ? ' active' : '');
    div.dataset.date = d;
    div.innerHTML = `<div>${fmtDate(d)}</div>`;
    div.addEventListener('click', () => {
      document.querySelectorAll('.date-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      showReport(d);
    });
    list.appendChild(div);
  });
}

function showReport(dateStr) {
  const root  = document.getElementById('report-root');
  const empty = document.getElementById('empty');
  const data  = (typeof REPORTS !== 'undefined') && REPORTS[dateStr];
  if (!data) {
    root.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  root.innerHTML = renderReport(data);
}

// ── Init ──
(function init() {
  if (typeof REPORTS === 'undefined' || !Object.keys(REPORTS).length) {
    document.getElementById('empty').style.display = 'flex';
    return;
  }
  const dates = Object.keys(REPORTS).sort().reverse();
  buildSidebar(dates);
  showReport(dates[0]);
})();
</script>
</body>
</html>
